# Токен бота (получить у @BotFather)
# Задайте переменную окружения BOT_TOKEN
bot.token=${BOT_TOKEN:}

# Постоянное хранение: база H2 в папке data (список автобусов не теряется при перезапуске)
# Файл появится после первого запуска бота. Путь — от папки, из которой запускаете приложение.
spring.datasource.url=jdbc:h2:file:${user.dir}/data/buspark
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=update
# Включить веб-консоль H2: после запуска бота откройте в браузере http://localhost:8080/h2-console
spring.h2.console.enabled=true
