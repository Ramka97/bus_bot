# Токен бота (получить у @BotFather). Варианты:
# 1) В Run Configuration → Environment variables добавить BOT_TOKEN = ваш токен
# 2) Открыть application-local.properties, вставить токен вместо ВСТАВЬТЕ_СЮДА_..., в Run Configuration → Program arguments добавить: --spring.profiles.active=local
bot.token=${BOT_TOKEN:}

# Постоянное хранение: база H2 в папке data (список автобусов не теряется при перезапуске)
# Файл появится после первого запуска бота. Путь — от папки, из которой запускаете приложение.
# AUTO_SERVER=TRUE — можно запускать приложение и H2 Console одновременно, база не блокируется
# USER=sa, пароль sa — для доступа к базе и H2 Console
spring.datasource.url=jdbc:h2:file:${user.dir}/data/buspark;AUTO_SERVER=TRUE
spring.datasource.username=sa
spring.datasource.password=sa
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
# Веб-консоль H2: http://localhost:8080/h2-console — JDBC URL из лога приложения, User: sa, Password: sa
spring.h2.console.enabled=true
